aid: job-corps
name: Job Corps
description: >-
  Job Corps is the nation's largest free residential education and job training
  program for young adults, operated by the U.S. Department of Labor. It helps
  eligible young people ages 16 through 24 improve the quality of their lives
  through vocational and academic training.
